name: absolute-cinemas
region: ams

# ─── Backend (Django REST API) ───────────────────────────────────────────────
services:
  - name: backend
    image:
      registry_type: DOCR
      repository: absolutecinemas-backend
      tag: latest
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    run_command: gunicorn cinema_backend.wsgi:application --bind 0.0.0.0:8000 --workers 2
    health_check:
      http_path: /api/movies/
      initial_delay_seconds: 30
      period_seconds: 30
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: cinema_backend.settings
        scope: RUN_TIME
      - key: SECRET_KEY
        value: ${SECRET_KEY}
        scope: RUN_TIME
        type: SECRET
      - key: DATABASE_URL
        value: ${DATABASE_URL}
        scope: RUN_TIME
        type: SECRET
      - key: ALLOWED_HOSTS
        value: ${APP_DOMAIN}
        scope: RUN_TIME
      - key: CORS_ALLOWED_ORIGINS
        value: https://${APP_DOMAIN}
        scope: RUN_TIME
      - key: STRIPE_SECRET_KEY
        value: ${STRIPE_SECRET_KEY}
        scope: RUN_TIME
        type: SECRET

# ─── Frontend (React / Nginx) ─────────────────────────────────────────────────
  - name: frontend
    image:
      registry_type: DOCR
      repository: absolutecinemas-frontend
      tag: latest
    http_port: 80
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    health_check:
      http_path: /
      initial_delay_seconds: 20
      period_seconds: 30
    envs:
      - key: VITE_API_URL
        value: https://${backend.PUBLIC_URL}
        scope: BUILD_TIME

# ─── Managed PostgreSQL database ─────────────────────────────────────────────
databases:
  - name: cinema-db
    engine: PG
    version: "16"
    production: false
    cluster_name: absolute-cinemas-db
