name: Deploy to DigitalOcean

on:
  push:
    branches: [master]

env:
  REGISTRY: registry.digitalocean.com
  DO_REGISTRY: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}
  IMAGE_BACKEND: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/absolutecinemas-backend
  IMAGE_FRONTEND: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}/absolutecinemas-frontend

jobs:
  build-and-push:
    name: Build & Push to DOCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Extract short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./BackEnd
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./FrontEnd
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.sha }}

  deploy:
    name: Deploy App on DigitalOcean
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Extract short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Deploy new revision to App Platform
        run: |
          APP_ID="${{ secrets.DO_APP_ID }}"
          if [ -z "$APP_ID" ]; then
            echo "Creating new App Platform app..."
            APP_ID=$(doctl apps create --spec .do/app.yaml --format ID --no-header)
            echo "Created app: $APP_ID"
          else
            echo "Deploying to existing app: $APP_ID"
            doctl apps update "$APP_ID" --spec .do/app.yaml
            doctl apps create-deployment "$APP_ID" \
              --force-rebuild \
              --wait
          fi

      - name: Summary
        run: |
          echo "### Deployed to DigitalOcean App Platform" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`${{ env.IMAGE_BACKEND }}:${{ steps.meta.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY

