name: Deploy to DigitalOcean

on:
  workflow_run:
    workflows: ["Docker Build & Push"]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    name: Deploy to App Platform
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Inject secrets into app spec
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          python3 << 'PYEOF'
          import os

          keys = ['STRIPE_SECRET_KEY', 'STRIPE_PUBLISHABLE_KEY', 'STRIPE_WEBHOOK_SECRET']
          lines = []
          for k in keys:
              v = os.environ.get(k, '')
              if v:
                  lines.append(f'      - key: {k}')
                  lines.append(f'        value: "{v}"')
                  lines.append(f'        scope: RUN_AND_BUILD_TIME')

          if not lines:
              print("No Stripe secrets to inject")
              raise SystemExit(0)

          with open('digitalocean/app.yaml', 'r') as f:
              content = f.read()

          marker = '    health_check:'
          inject = '\n'.join(lines) + '\n'
          content = content.replace(marker, inject + '    health_check:', 1)

          with open('digitalocean/app.yaml', 'w') as f:
              f.write(content)

          print("Injected Stripe secrets into app spec")
          PYEOF

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Update app spec
        run: |
          APP_ID=$(doctl apps list --format ID,Spec.Name --no-header | grep absolute-cinemas | awk '{print $1}')
          doctl apps update $APP_ID --spec digitalocean/app.yaml

      - name: Deploy to App Platform
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_spec_location: digitalocean/app.yaml
