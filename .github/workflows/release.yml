name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

jobs:
  release:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Calculate next version
        id: ver
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then NEW="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST#v}"
            NEW="v${MAJOR}.${MINOR}.$((PATCH+1))"
          fi
          echo "tag=$NEW" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./BackEnd
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/absolute-cinemas-backend:${{ steps.ver.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/absolute-cinemas-backend:stable
            ghcr.io/${{ github.repository_owner }}/absolute-cinemas-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./FrontEnd
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository_owner }}/absolute-cinemas-frontend:${{ steps.ver.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/absolute-cinemas-frontend:stable
            ghcr.io/${{ github.repository_owner }}/absolute-cinemas-frontend:latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          gh release create "$TAG" \
            --title "AbsoluteCinema $TAG" \
            --notes "## Docker Images

          \`\`\`
          ghcr.io/${{ github.repository_owner }}/absolute-cinemas-backend:$TAG
          ghcr.io/${{ github.repository_owner }}/absolute-cinemas-frontend:$TAG
          \`\`\`

          Stable release — all CI checks passed on master." \
            --latest
