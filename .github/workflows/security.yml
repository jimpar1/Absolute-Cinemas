name: Security Scan

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  backend-audit:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    outputs:
      vulnerable: ${{ steps.audit.outputs.vulnerable }}
      report: ${{ steps.audit.outputs.report }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BackEnd/requirements.txt

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        id: audit
        working-directory: BackEnd
        run: |
          set +e
          OUTPUT=$(pip-audit -r requirements.txt --format=markdown 2>&1)
          EXIT_CODE=$?
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "vulnerable=true" >> "$GITHUB_OUTPUT"
          else
            echo "vulnerable=false" >> "$GITHUB_OUTPUT"
          fi

  frontend-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    outputs:
      vulnerable: ${{ steps.audit.outputs.vulnerable }}
      report: ${{ steps.audit.outputs.report }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Install dependencies
        working-directory: FrontEnd
        run: npm ci

      - name: Run npm audit
        id: audit
        working-directory: FrontEnd
        run: |
          set +e
          OUTPUT=$(npm audit --audit-level=moderate 2>&1)
          EXIT_CODE=$?
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "vulnerable=true" >> "$GITHUB_OUTPUT"
          else
            echo "vulnerable=false" >> "$GITHUB_OUTPUT"
          fi

  open-issue:
    name: Open Issue if Vulnerable
    runs-on: ubuntu-latest
    needs: [backend-audit, frontend-audit]
    if: needs.backend-audit.outputs.vulnerable == 'true' || needs.frontend-audit.outputs.vulnerable == 'true'
    permissions:
      issues: write

    steps:
      - name: Create vulnerability issue
        uses: actions/github-script@v7
        with:
          script: |
            const backendVulnerable = '${{ needs.backend-audit.outputs.vulnerable }}' === 'true';
            const frontendVulnerable = '${{ needs.frontend-audit.outputs.vulnerable }}' === 'true';

            const parts = [];
            if (backendVulnerable) {
              parts.push('### Backend (pip-audit)\n\n```\n${{ needs.backend-audit.outputs.report }}\n```');
            }
            if (frontendVulnerable) {
              parts.push('### Frontend (npm audit)\n\n```\n${{ needs.frontend-audit.outputs.report }}\n```');
            }

            const body = [
              '## Vulnerability Report',
              '',
              `Security scan ran on ${new Date().toISOString().split('T')[0]}.`,
              '',
              ...parts,
              '',
              '> Auto-generated by the Security Scan workflow.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Security: Vulnerable dependencies found (${new Date().toISOString().split('T')[0]})`,
              body,
              labels: ['security'],
            });
