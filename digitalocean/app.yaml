name: absolute-cinemas
region: ams
databases:
  - engine: PG
    name: cinema-db
    version: "16"
services:
  - name: backend
    image:
      registry_type: GHCR
      registry: jimpar1
      repository: absolutecinemas-backend
      tag: latest
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: SECRET_KEY
        value: "abc123secretkey12345678901234567890123456789012"
        scope: RUN_AND_BUILD_TIME
      - key: DEBUG
        value: "false"
        scope: RUN_AND_BUILD_TIME
      - key: ALLOWED_HOSTS
        value: "*"
        scope: RUN_AND_BUILD_TIME
      - key: CORS_ALLOWED_ORIGINS
        value: https://absolute-cinemas-olazi.ondigitalocean.app
        scope: RUN_AND_BUILD_TIME
      - key: CSRF_TRUSTED_ORIGINS
        value: https://absolute-cinemas-olazi.ondigitalocean.app
        scope: RUN_AND_BUILD_TIME
      - key: DB_HOST
        value: ${cinema-db.HOSTNAME}
        scope: RUN_TIME
      - key: DB_PORT
        value: ${cinema-db.PORT}
        scope: RUN_TIME
      - key: DB_NAME
        value: ${cinema-db.DATABASE}
        scope: RUN_TIME
      - key: DB_USER
        value: ${cinema-db.USERNAME}
        scope: RUN_TIME
      - key: DB_PASSWORD
        value: ${cinema-db.PASSWORD}
        scope: RUN_TIME
      - key: ADMIN_USERNAME
        value: admin
        scope: RUN_AND_BUILD_TIME
      - key: ADMIN_EMAIL
        value: admin@cinema.local
        scope: RUN_AND_BUILD_TIME
      - key: ADMIN_PASSWORD
        value: admin123456
        scope: RUN_AND_BUILD_TIME
      - key: STAFF_USERNAME
        value: staff
        scope: RUN_AND_BUILD_TIME
      - key: STAFF_EMAIL
        value: staff@cinema.local
        scope: RUN_AND_BUILD_TIME
      - key: STAFF_PASSWORD
        value: staff123456
        scope: RUN_AND_BUILD_TIME
      - key: TMDB_API_KEY
        value: "18324c6e6eb5ceed0ea8c49c26fcf8b8"
        scope: RUN_AND_BUILD_TIME
      - key: DB_SSLMODE
        value: require
        scope: RUN_TIME
      - key: FRONTEND_ALLOWED_ORIGINS
        value: "https://absolute-cinemas-olazi.ondigitalocean.app"
        scope: RUN_AND_BUILD_TIME
    health_check:
      http_path: /api/movies/
      initial_delay_seconds: 60
      period_seconds: 30

  - name: frontend
    image:
      registry_type: GHCR
      registry: jimpar1
      repository: absolutecinemas-frontend
      tag: latest
    http_port: 80
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

domains:
  - domain: absolutecinemas.gr
    type: PRIMARY
  - domain: www.absolutecinemas.gr
    type: ALIAS

ingress:
  rules:
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        path:
          prefix: /api
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        path:
          prefix: /admin
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        path:
          prefix: /media
    - component:
        name: backend
        preserve_path_prefix: true
      match:
        path:
          prefix: /static
    - component:
        name: frontend
      match:
        path:
          prefix: /
